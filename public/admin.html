<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center - Admin Panel</title>
    <style>
        body, html {
            margin:0; padding:0; width:100%; height:100%;
            background-color: #060813; color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        #login-screen {
            background: #0d1224; border: 1px solid rgba(255,255,255,0.08);
            padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center; width: 100%; max-width: 400px;
        }
        h2 { color: #38bdf8; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 25px; }
        input {
            width: 100%; background: #02040a; border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px; border-radius: 12px; color: white; font-size: 16px;
            outline: none; margin-bottom: 20px; text-align: center;
        }
        button.login-btn {
            width:100%; background: #38bdf8; border:none; padding:14px;
            border-radius:12px; color:#0f172a; font-weight:bold; font-size:16px; cursor:pointer;
        }
        
        #dashboard {
            display: none; width: 100%; max-width: 600px; background: #0d1224;
            border: 1px solid rgba(255,255,255,0.08); padding: 35px; border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7); text-align: center;
        }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .control-btn {
            background: #1e293b; border: 1px solid rgba(255,255,255,0.05); color: white;
            padding: 18px; border-radius: 14px; font-weight: bold; font-size: 14px; cursor: pointer;
        }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; }
        .btn-danger:hover { background: #ef4444; color: white; }
        .btn-warn { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.4); color: #fbbf24; }
        .btn-warn:hover { background: #f59e0b; color: #0f172a; }
        #status-bar { margin-top: 25px; background: #02040a; padding: 12px; border-radius: 10px; font-size: 12px; color: #64748b; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <h2>Вход в Control Center</h2>
        <input type="password" id="pass-input" placeholder="Введите ключ администратора" autocomplete="off">
        <button class="login-btn" onclick="tryLogin()">Авторизоваться</button>
    </div>

    <div id="dashboard">
        <h2>👑 Панель Управления Столом</h2>
        <div class="btn-grid">
            <button class="control-btn btn-warn" onclick="triggerReset()">🔄 Сбросить все карты</button>
            <button class="control-btn" onclick="triggerShuffle()">🔀 Перемешать карты</button>
            <button class="control-btn btn-danger" id="freeze-btn" onclick="triggerFreeze()">🔒 Заблокировать стол</button>
            <button class="control-btn" onclick="window.location.href='/'">🎮 Перейти к игре</button>
        </div>
        <div id="status-bar">Статус подключения: Авторизован как Главный Администратор</div>
    </div>

    <script>
        const socket = io();
        let isBoardFrozen = false;

        function tryLogin() {
            const pass = document.getElementById('pass-input').value;
            socket.emit('adminLogin', pass);
        }

        socket.on('adminAuthResult', (res) => {
            if(res.success) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert(res.message);
            }
        });

        socket.on('boardFreezeStatus', (status) => {
            isBoardFrozen = status;
            const btn = document.getElementById('freeze-btn');
            if(isBoardFrozen) {
                btn.innerText = "🔓 Разблокировать стол";
                btn.style.background = "rgba(16, 185, 129, 0.2)";
                btn.style.borderColor = "#10b981";
                btn.style.color = "#34d399";
            } else {
                btn.innerText = "🔒 Заблокировать стол";
                btn.style.background = "rgba(239, 68, 68, 0.15)";
                btn.style.borderColor = "rgba(239, 68, 68, 0.4)";
                btn.style.color = "#f87171";
            }
        });

        function triggerReset() { if(confirm("Сбросить все карты в исходную сетку?")) socket.emit('adminResetTable'); }
        function triggerShuffle() { socket.emit('adminShuffleTable'); }
        function triggerFreeze() { socket.emit('adminToggleFreeze'); }
    </script>
</body>
</html>
